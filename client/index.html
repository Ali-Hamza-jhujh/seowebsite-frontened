<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary Meta Tags -->
    <title>SEO Specialist | Khalis Marketing</title>
    <meta name="title" content="SEO Specialist | Khalis Marketing" />
    <meta name="description" content="Khalis Marketing is an SEO specialist with 10+ years experience helping businesses rank on Google. No lock-in contracts. Transparent strategies. Real results. Get your free SEO audit today." />
    <meta name="keywords" content="SEO specialist, SEO agency Melbourne, local SEO, search engine optimisation, SEO services, technical SEO, on-page SEO, link building" />
    <meta name="author" content="Bhavleen Singh, Khalis Marketing" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#04315b" />

    <!-- Canonical -->
    <link rel="canonical" href="https://khalismarketing.com.au/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://khalismarketing.com.au/" />
    <meta property="og:title" content="SEO Specialist | Khalis Marketing" />
    <meta property="og:description" content="10+ years of SEO experience. No lock-in contracts. Transparent strategies that get your business found on Google. Get your free SEO audit today." />
    <meta property="og:image" content="https://khalismarketing.com.au/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Khalis Marketing" />
    <meta property="og:locale" content="en_AU" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://khalismarketing.com.au/" />
    <meta name="twitter:title" content="SEO Specialist | Khalis Marketing" />
    <meta name="twitter:description" content="10+ years of SEO experience. No lock-in contracts. Transparent strategies that get your business found on Google." />
    <meta name="twitter:image" content="https://khalismarketing.com.au/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Khalis Marketing",
      "description": "SEO specialist with 10+ years experience helping businesses rank on Google. No lock-in contracts, transparent strategies, real results.",
      "url": "https://khalismarketing.com.au",
      "logo": "https://khalismarketing.com.au/favicon.svg",
      "image": "https://khalismarketing.com.au/og-image.png",
      "telephone": "",
      "email": "hello@khalismarketing.com.au",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Melbourne",
        "addressRegion": "VIC",
        "addressCountry": "AU"
      },
      "areaServed": [
        { "@type": "City", "name": "Melbourne" },
        { "@type": "City", "name": "Werribee" },
        { "@type": "City", "name": "Hoppers Crossing" },
        { "@type": "City", "name": "Tarneit" },
        { "@type": "City", "name": "Melton" }
      ],
      "serviceType": [
        "Search Engine Optimisation",
        "Local SEO",
        "Technical SEO",
        "On-Page SEO",
        "Link Building",
        "SEO Audit",
        "Ecommerce SEO",
        "Website Design"
      ],
      "priceRange": "$$",
      "sameAs": [],
      "founder": {
        "@type": "Person",
        "name": "Bhavleen Singh",
        "jobTitle": "SEO Specialist",
        "knowsAbout": ["Search Engine Optimisation", "Local SEO", "Technical SEO", "Content Strategy"]
      }
    }
    </script>

    <!-- Structured Data: WebSite (enables Sitelinks Search Box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Khalis Marketing",
      "url": "https://khalismarketing.com.au",
      "description": "SEO specialist helping businesses rank on Google with transparent, white-hat strategies.",
      "inLanguage": "en-AU"
    }
    </script>

    <!-- Fonts: preconnect + non-blocking load to fix render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts asynchronously to avoid render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
